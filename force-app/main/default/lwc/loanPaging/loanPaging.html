<template>
    <div>
        <lightning-card title="Loan Paging">
                <template lwc:if={hasList}>

                <lightning-datatable
                key-field="Id"
                data = {visibleLoans}
                columns={columns}
                >
                </lightning-datatable>

                <div class="slds-m-top_medium">

                    <lightning-button
                        label="Previous"
                        onclick={handlePrevious}>
                    </lightning-button>

                    <span class="slds-p-horizontal_medium">

                        Page {currentPage}
                        of
                        {totalPages}

                    </span>

                    <lightning-button
                        label="Next"
                        onclick={handleNext}>
                    </lightning-button>

                </div>

            </template>

            <template lwc:else>
                No loan found!
            </template>
        </lightning-card>
    </div>
    
</template>
