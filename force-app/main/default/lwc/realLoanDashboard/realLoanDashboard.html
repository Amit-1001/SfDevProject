<template>
    <div>
        <lightning-card title="Loan Operations Team Dashboard">

            <!-- Search -->
            <div class="slds-m-around_medium">

                    <lightning-input
                        label="Search Loan"
                        value={name}
                        onchange={handleChange}>
                    </lightning-input>

            </div>

            <template lwc:if={isLoading}>
                <lightning-spinner></lightning-spinner>
            </template>

            <template lwc:if={hasList}>
                
                <div>
                    <lightning-datatable
                                    key-field="Id"
                                    data={visibleLoans}
                                    columns={columns}

                                    sorted-by={sortBy}
                                    sorted-direction={sortDirection}
                                    onsort ={handleSort}
                                    
                                    draft-values={draftValues}
                                    onsave={handleSave}

                                    onrowaction={handleRowAction}
                                    
                                    >

                                    </lightning-datatable>
                </div>

                <div>
                    <lightning-button
                    label="Previous"
                    onclick={handlePrevious}
                    >
                </lightning-button>

                <span class="slds-p-horizontal_medium">

                    Page {currentPage}
                    of
                    {totalPages}

                </span>

                <lightning-button
                    label="Next"
                    onclick={handleNext}
                    >
                </lightning-button>
                </div>
                

            </template>

            <template lwc:else>
                No loan found!

            </template>


        </lightning-card>

    </div>
    
</template>
