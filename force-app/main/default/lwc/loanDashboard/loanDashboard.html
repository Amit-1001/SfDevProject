<template>
    <div>
        <lightning-card title="Bank Dashboard">
            <template lwc:if={isLoading}>
                <lightning-spinner>
                    
                </lightning-spinner>
            </template>
        <template lwc:if={loanList}>
            <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                <thead>
                    <tr>
                                <th>Loan Name</th>
                                <th>Customer</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <template for:each={loanList} for:item="loanItem">
                                <c-loan-row
                                    key={loanItem.Id}
                                    loan={loanItem}
                                    is-loading={isLoading}
                                    onapprove={handleLoanApproval}
                                    onreject={handleLoanRejection}>
                                </c-loan-row>
                        </template>
                </tbody>

            </table>
        </template>

        <template lwc:else>
            No more pending loans!
        </template>

        </lightning-card>
    </div>
    
</template>
