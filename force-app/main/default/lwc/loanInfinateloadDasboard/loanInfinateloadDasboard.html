    <lightning-card title="Loan Infinite Loading">
        <div class="slds-p-around_medium" style="height:300px;">

                data={loanList}

                columns={columns}

                onloadmore={loadMoreData}

                is-loading={isLoading}>

            </lightning-datatable>

        </div>

    </lightning-card>
    
</template>
