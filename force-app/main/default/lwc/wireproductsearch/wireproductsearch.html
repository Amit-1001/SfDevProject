<template>
    <lightning-card title="Product Search">
        <div class="slds-p-around_medium">
            <lightning-input label="Search Product Name" value={productName}  placeholder="Enter Product Name" onchange={handleChange}></lightning-input>
        <template if:true={products}>
            <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                <thead> 
                    <tr>
                        <th>Product Id</th>
                        <th>Product Name</th>
                        <th>Available Quantity</th>
                    </tr>
                    

                </thead>
                <tbody>
                    <template for:each={products} for:item = "product">
                        <tr key = {product.Id}>
                            <td>{product.Id}</td>
                            <td>{product.Name}</td>
                            <td>{product.Stock_Quantity__c}</td>
                        </tr>

                    </template>
                </tbody>

            </table>
            
        </template>
        
        
        </div>
    </lightning-card>
    
</template>
